<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Night Sky" />
  <meta name="theme-color" content="#050b18" />
  <title>Night Sky — 扣款管理</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg: #050b18;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --text: #e2eaf8;
      --muted: #475569;
      --dim: #334155;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --gold: #fbbf24;
      --cyan: #22d3ee;
      --orange: #fb923c;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Star field */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 52%, rgba(255,255,255,.45) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 38% 8%, rgba(255,255,255,.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 54% 68%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 69% 28%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 81% 82%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 44%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 14% 78%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 61% 48%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 33% 33%, rgba(180,200,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 76% 18%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 4%  94%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 48% 22%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 17% 38%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 70%, rgba(200,220,255,.5) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    /* Aurora */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 20% 0%, rgba(99,179,237,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 35% at 80% 5%, rgba(167,139,250,.06) 0%, transparent 55%),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(56,189,248,.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      max-width: 430px; margin: 0 auto;
      z-index: 1;
      padding-top: var(--safe-top);
    }

    /* Header */
    .header { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--blue), var(--purple)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 16px rgba(96,165,250,.4); }
    .logo-text { font-size: 17px; font-weight: 600; letter-spacing: -.3px; background: linear-gradient(90deg, #93c5fd, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .date-pill { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-family: 'DM Mono', monospace; color: #94a3b8; letter-spacing: .3px; }

    /* Tabs */
    .tabs { display: flex; margin: 12px 20px 0; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 4px; gap: 2px; flex-shrink: 0; }
    .tab { flex: 1; padding: 8px 0; border: none; background: transparent; color: #64748b; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; border-radius: 10px; cursor: pointer; transition: all .2s; }
    .tab.active { background: linear-gradient(135deg, rgba(96,165,250,.2), rgba(167,139,250,.15)); color: #93c5fd; box-shadow: 0 0 12px rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.2); }

    /* Content */
    .content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px 20px; padding-bottom: calc(80px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }
    .content::-webkit-scrollbar { width: 0; }

    /* Glass */
    .glass { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; backdrop-filter: blur(20px); margin-bottom: 12px; transition: border-color .2s, box-shadow .2s; }
    .glass.glow-blue { border-color: rgba(96,165,250,.25); box-shadow: 0 0 30px rgba(96,165,250,.1), inset 0 0 30px rgba(96,165,250,.03); }
    .glass.glow-alert { border-color: rgba(251,191,36,.35); box-shadow: 0 0 24px rgba(251,191,36,.1), inset 0 0 20px rgba(251,191,36,.03); }

    .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
    .sec-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); font-weight: 600; margin: 18px 0 10px; }

    /* Pulse dot */
    .pulse-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 8px rgba(251,191,36,.6); animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.6; transform:scale(.8); } }

    /* Card badge */
    .card-badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 7px; padding: 2px 8px; font-size: 11px; font-weight: 600; letter-spacing: .2px; white-space: nowrap; }
    .card-badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* Bill badge */
    .bill-badge { display: inline-flex; align-items: center; background: rgba(34,211,238,.1); border: 1px solid rgba(34,211,238,.25); color: var(--cyan); border-radius: 7px; padding: 2px 8px; font-size: 11px; font-weight: 600; white-space: nowrap; }

    /* List row */
    .list-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 16px; margin-bottom: 8px; transition: all .2s; cursor: pointer; }
    .list-row:active { transform: scale(.98); opacity: .85; }
    .row-icon { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .icon-card { background: rgba(96,165,250,.12); }
    .icon-bill { background: rgba(34,211,238,.1); }
    .icon-yr   { background: rgba(167,139,250,.12); }
    .icon-multi{ background: rgba(251,146,60,.1); }
    .row-info { flex: 1; min-width: 0; }
    .row-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .row-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .row-right { text-align: right; flex-shrink: 0; }
    .row-amount { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--text); }
    .row-amount-nd { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* Cycle badges */
    .cycle-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600; letter-spacing: .3px; }
    .badge-m     { background: rgba(96,165,250,.12); color: var(--blue);   border: 1px solid rgba(96,165,250,.2); }
    .badge-y     { background: rgba(167,139,250,.12); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
    .badge-bill  { background: rgba(34,211,238,.1);   color: var(--cyan);   border: 1px solid rgba(34,211,238,.22); }
    .badge-multi { background: rgba(251,146,60,.1);   color: var(--orange); border: 1px solid rgba(251,146,60,.22); }

    /* Summary grid */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .mini-card { background: var(--surface); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 16px; text-align: center; }
    .mini-val  { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: #93c5fd; }
    .mini-label{ font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Bar chart */
    .bar-wrap { flex: 1; height: 3px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 2px; transition: width .4s ease; }

    /* Lookup button */
    .lookup-btn { display: inline-flex; align-items: center; gap: 4px; background: rgba(96,165,250,.1); border: 1px solid rgba(96,165,250,.2); color: var(--blue); border-radius: 7px; padding: 3px 9px; font-size: 11px; font-weight: 600; cursor: pointer; text-decoration: none; white-space: nowrap; }

    /* pickmycard banner */
    .pmc-banner { display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, rgba(96,165,250,.08), rgba(167,139,250,.08)); border: 1px solid rgba(96,165,250,.2); border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all .2s; text-decoration: none; }
    .pmc-banner:active { opacity: .85; }
    .pmc-icon { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, rgba(96,165,250,.2), rgba(167,139,250,.15)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .pmc-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .pmc-sub   { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* Search */
    .search-bar { width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 14px; padding: 11px 16px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; margin-bottom: 12px; }
    .search-bar::placeholder { color: var(--dim); }
    .search-bar:focus { border-color: rgba(96,165,250,.4); }

    /* Filter strip */
    .filter-strip { display: flex; gap: 7px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
    .filter-strip::-webkit-scrollbar { height: 0; }
    .filter-btn { border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); color: #64748b; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; border-radius: 20px; padding: 5px 13px; cursor: pointer; white-space: nowrap; transition: all .2s; flex-shrink: 0; }
    .filter-btn.active { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.22); color: var(--text); }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
    .form-input, .form-select { width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 11px 14px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; appearance: none; }
    .form-input:focus, .form-select:focus { border-color: rgba(96,165,250,.5); box-shadow: 0 0 0 3px rgba(96,165,250,.08); }
    .form-input::placeholder { color: var(--dim); }
    .form-select { background-color: #0c1525; }
    .form-note { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* Type toggle */
    .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .type-btn { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.1); background: transparent; color: #64748b; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; }
    .type-btn.active-card { background: rgba(96,165,250,.12); border-color: rgba(96,165,250,.4); color: var(--blue); }
    .type-btn.active-bill { background: rgba(34,211,238,.1); border-color: rgba(34,211,238,.35); color: var(--cyan); }

    /* Cycle grid */
    .cycle-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
    .cycle-btn { padding: 10px 4px; border-radius: 11px; border: 1px solid rgba(255,255,255,.1); background: transparent; color: #64748b; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; text-align: center; line-height: 1.3; }
    .cycle-btn.active-m { background: rgba(96,165,250,.12); border-color: rgba(96,165,250,.4); color: var(--blue); }
    .cycle-btn.active-y { background: rgba(167,139,250,.12); border-color: rgba(167,139,250,.4); color: var(--purple); }
    .cycle-btn.active-x { background: rgba(251,146,60,.1); border-color: rgba(251,146,60,.35); color: var(--orange); }

    /* Next date hint */
    .next-hint { background: rgba(251,146,60,.06); border: 1px solid rgba(251,146,60,.18); border-radius: 11px; padding: 11px 14px; font-size: 12px; color: #64748b; line-height: 1.7; margin-top: 10px; }

    /* Card trigger */
    .card-trigger { width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 11px 14px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: border-color .2s; display: flex; align-items: center; justify-content: space-between; }
    .card-trigger:hover { border-color: rgba(96,165,250,.4); }
    .card-trigger-placeholder { color: var(--dim); }

    /* Buttons */
    .btn-primary   { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(96,165,250,.3); background: linear-gradient(135deg, rgba(96,165,250,.25), rgba(167,139,250,.2)); color: #93c5fd; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; letter-spacing: .3px; }
    .btn-primary:active { opacity: .8; transform: scale(.98); }
    .btn-secondary { width: 100%; padding: 13px; border-radius: 14px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); color: #64748b; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; margin-top: 8px; }
    .btn-secondary:active { opacity: .8; }
    .btn-ics       { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(251,191,36,.3); background: rgba(251,191,36,.08); color: var(--gold); font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
    .btn-ics:active { opacity: .8; }
    .btn-danger    { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.25); color: #f87171; border-radius: 10px; padding: 7px 14px; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }

    /* Info box */
    .info-box { background: rgba(96,165,250,.06); border: 1px solid rgba(96,165,250,.15); border-radius: 12px; padding: 12px 14px; font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,.05); margin: 16px 0; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--dim); font-size: 13px; line-height: 1.8; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(5,11,24,.85); backdrop-filter: blur(12px); display: flex; align-items: flex-end; justify-content: center; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-sheet { width: 100%; max-width: 430px; background: #0c1525; border: 1px solid rgba(255,255,255,.1); border-radius: 24px 24px 0 0; padding: 20px 20px calc(20px + var(--safe-bottom)); animation: slideUp .25s ease; max-height: 85vh; overflow-y: auto; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,.15); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title  { font-size: 12px; font-weight: 600; color: #64748b; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 16px; }

    /* Card option in modal */
    .card-option { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border: 1px solid rgba(255,255,255,.08); border-radius: 14px; cursor: pointer; transition: all .18s; margin-bottom: 8px; width: 100%; font-family: 'DM Sans', sans-serif; background: rgba(255,255,255,.03); }
    .card-option-left { display: flex; align-items: center; gap: 11px; }
    .card-option-name { font-size: 15px; font-weight: 500; color: #94a3b8; }
    .add-custom-btn { width: 100%; padding: 12px 16px; background: rgba(255,255,255,.03); border: 1px dashed rgba(255,255,255,.12); border-radius: 14px; color: var(--muted); font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* Detail modal */
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
    .detail-row:last-of-type { border-bottom: none; }
    .detail-key { font-size: 12px; color: var(--muted); }
    .detail-val { font-size: 14px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; }

    /* Edit actions */
    .edit-actions { display: flex; gap: 8px; margin-top: 16px; }
    .edit-actions .btn-primary { flex: 1; margin-top: 0; }

    /* Toast */
    .toast { position: fixed; bottom: calc(90px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: rgba(30,40,60,.95); border: 1px solid rgba(255,255,255,.15); border-radius: 12px; padding: 10px 18px; font-size: 13px; color: var(--text); z-index: 300; animation: toastIn .3s ease; white-space: nowrap; backdrop-filter: blur(20px); }
    @keyframes toastIn { from { opacity:0; transform: translate(-50%,10px); } to { opacity:1; transform: translate(-50%,0); } }

    /* Bottom nav */
    .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(5,11,24,.9); backdrop-filter: blur(30px); border-top: 1px solid rgba(255,255,255,.07); display: flex; padding: 8px 16px; padding-bottom: calc(10px + var(--safe-bottom)); z-index: 10; flex-shrink: 0; }
    .bt { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; border: none; background: transparent; color: var(--dim); font-size: 10px; font-family: 'DM Sans', sans-serif; cursor: pointer; border-radius: 10px; transition: all .2s; }
    .bt.active { color: var(--blue); }
    .bt-icon { font-size: 20px; line-height: 1; }

    #file-import { display: none; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">Night Sky</span>
    </div>
    <div class="date-pill" id="date-display"></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>
<input type="file" id="file-import" accept=".json" />

<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const PALETTE = [
  { bg:'rgba(96,165,250,.14)',  border:'rgba(96,165,250,.40)',  text:'#60a5fa', dot:'#60a5fa' },
  { bg:'rgba(251,191,36,.13)',  border:'rgba(251,191,36,.38)',  text:'#fbbf24', dot:'#fbbf24' },
  { bg:'rgba(52,211,153,.12)',  border:'rgba(52,211,153,.38)',  text:'#34d399', dot:'#34d399' },
  { bg:'rgba(232,121,249,.13)', border:'rgba(232,121,249,.38)', text:'#e879f9', dot:'#e879f9' },
  { bg:'rgba(251,146,60,.13)',  border:'rgba(251,146,60,.38)',  text:'#fb923c', dot:'#fb923c' },
  { bg:'rgba(167,139,250,.14)', border:'rgba(167,139,250,.38)', text:'#a78bfa', dot:'#a78bfa' },
  { bg:'rgba(34,211,238,.12)',  border:'rgba(34,211,238,.35)',  text:'#22d3ee', dot:'#22d3ee' },
  { bg:'rgba(248,113,113,.12)', border:'rgba(248,113,113,.33)', text:'#f87171', dot:'#f87171' },
];

const DEFAULT_CARDS = ['國泰 CUBE','富邦 J 卡','台新 Richart','台新 FlyGo','台新 Point'];

const CYCLE_OPTIONS = [
  { value:'monthly',    label:'每月',    months:1  },
  { value:'bimonthly',  label:'每兩個月', months:2  },
  { value:'quarterly',  label:'每三個月', months:3  },
  { value:'semiannual', label:'每六個月', months:6  },
  { value:'yearly',     label:'每年',    months:12 },
];

const PAY_METHODS = ['線上繳費','信用卡繳費','自動轉帳','電信繳費','超商繳費','現金繳費'];

const ITEM_ICONS = {
  netflix:'🎬', hbo:'🎬', disney:'🎬', apple:'🍎', icloud:'☁️',
  spotify:'🎵', kkbox:'🎵', youtube:'▶️', adobe:'🎨', figma:'🎨',
  chatgpt:'🤖', openai:'🤖', notion:'📝', dropbox:'📦', github:'🐱',
  google:'🔍', amazon:'📦', microsoft:'🪟', office:'🪟', zoom:'💬',
  slack:'💬', 網域:'🌐', domain:'🌐', 防毒:'🛡️', 保險:'🛡️',
  台電:'⚡', 電費:'⚡', 水費:'💧', 台灣大哥大:'📱', 中華電信:'📱',
  遠傳:'📱', 電話:'📱', 瓦斯:'🔥', 停車:'🚗', 管理費:'🏢',
};

function getIcon(name) {
  const n = name.toLowerCase();
  for (const [k,v] of Object.entries(ITEM_ICONS)) if (n.includes(k.toLowerCase())) return v;
  return '💳';
}

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let state = { items: [], cards: [...DEFAULT_CARDS], nextId: 1 };

function loadState() {
  try { const r = localStorage.getItem('nightsky-v2'); if (r) state = JSON.parse(r); } catch(e) {}
}
function saveState() { localStorage.setItem('nightsky-v2', JSON.stringify(state)); }
loadState();

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function getCardMap() {
  const m = {};
  state.cards.forEach((c,i) => { m[c] = PALETTE[i % PALETTE.length]; });
  return m;
}

function today() { return new Date(); }

function formatDatePill(d) {
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function cycleLabelOf(item) {
  if (item.cycle === 'monthly') return `每月 ${item.day} 號`;
  if (item.cycle === 'yearly') {
    const d = new Date(item.date);
    return `每年 ${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
  }
  const labels = { bimonthly:'每兩個月', quarterly:'每三個月', semiannual:'每六個月' };
  if (item.nextDate) {
    const d = new Date(item.nextDate);
    return `${labels[item.cycle]} · 下次 ${d.getMonth()+1}/${d.getDate()}`;
  }
  return labels[item.cycle] || item.cycle;
}

function isTodayItem(item) {
  const t = today();
  const td = t.getDate(), tm = t.getMonth()+1;
  if (item.cycle === 'monthly') return item.day === td;
  if (item.cycle === 'yearly') {
    const d = new Date(item.date);
    return d.getDate() === td && d.getMonth()+1 === tm;
  }
  if (item.nextDate) {
    const d = new Date(item.nextDate);
    return d.getDate() === td && d.getMonth()+1 === tm;
  }
  return false;
}

function isThisMonthBill(item) {
  if (item.type !== 'bill') return false;
  if (item.cycle === 'monthly') return true;
  if (item.nextDate) return new Date(item.nextDate).getMonth()+1 === today().getMonth()+1;
  return false;
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cardBadgeHTML(card, cardMap) {
  if (!card) return '';
  const c = cardMap[card] || PALETTE[0];
  return `<span class="card-badge" style="background:${c.bg};border:1px solid ${c.border};color:${c.text};">
    <span class="card-badge-dot" style="background:${c.dot};"></span>${escHtml(card)}
  </span>`;
}

function billBadgeHTML(method) {
  if (!method) return '';
  return `<span class="bill-badge">${escHtml(method)}</span>`;
}

function cycleBadgeHTML(item) {
  if (item.type === 'bill') {
    const isMulti = ['bimonthly','quarterly','semiannual'].includes(item.cycle);
    if (isMulti) {
      const lbl = CYCLE_OPTIONS.find(c=>c.value===item.cycle)?.label || item.cycle;
      return `<span class="cycle-badge badge-multi">${lbl}</span>`;
    }
    return `<span class="cycle-badge badge-bill">繳費</span>`;
  }
  if (item.cycle === 'yearly') return `<span class="cycle-badge badge-y">每年</span>`;
  return `<span class="cycle-badge badge-m">每月</span>`;
}

function rowIconClass(item) {
  if (item.type === 'bill') {
    return ['bimonthly','quarterly','semiannual'].includes(item.cycle) ? 'icon-multi' : 'icon-bill';
  }
  return item.cycle === 'yearly' ? 'icon-yr' : 'icon-card';
}

function listRowHTML(item, cardMap, showLookup) {
  const amtHTML = item.amount
    ? `<div class="row-amount">TWD ${Number(item.amount).toLocaleString()}</div>`
    : `<div class="row-amount-nd">金額不定</div>`;
  const lookupHTML = (showLookup && item.type !== 'bill')
    ? `<a class="lookup-btn" href="https://pickmycard.app" target="_blank" onclick="event.stopPropagation()">查回饋 ↗</a>`
    : '';
  return `
    <div class="list-row" onclick="showDetail(${item.id})">
      <div class="row-icon ${rowIconClass(item)}">${getIcon(item.name)}</div>
      <div class="row-info">
        <div class="row-name">${escHtml(item.name)}</div>
        <div class="row-meta">
          <span class="row-date">${cycleLabelOf(item)}</span>
          ${item.card      ? cardBadgeHTML(item.card, cardMap) : ''}
          ${item.payMethod ? billBadgeHTML(item.payMethod) : ''}
          ${lookupHTML}
        </div>
      </div>
      <div class="row-right">
        ${amtHTML}
        <div style="margin-top:5px;display:flex;justify-content:flex-end;">${cycleBadgeHTML(item)}</div>
      </div>
    </div>`;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ═══════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════
const TABS = ['概覽','清單','新增','備份'];
const BTICONS = ['✦','≡','＋','↑↓'];
let activeTab = 0;

function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map((t,i) =>
    `<button class="tab ${i===activeTab?'active':''}" onclick="switchTab(${i})">${t}</button>`
  ).join('');
  document.getElementById('bottom-nav').innerHTML = TABS.map((t,i) =>
    `<button class="bt ${i===activeTab?'active':''}" onclick="switchTab(${i})">
      <span class="bt-icon">${BTICONS[i]}</span>${t}
    </button>`
  ).join('');
}

function switchTab(i) { activeTab = i; renderTabs(); renderContent(); }

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function renderContent() {
  const c = document.getElementById('content');
  if      (activeTab === 0) c.innerHTML = renderOverview();
  else if (activeTab === 1) c.innerHTML = renderList();
  else if (activeTab === 2) c.innerHTML = renderAdd();
  else                      c.innerHTML = renderBackup();
}

// ─── Overview ─────────────────────────────────────
function renderOverview() {
  const cardMap = getCardMap();
  const t = today();
  const thisMonth = t.getMonth() + 1;

  const cardItems  = state.items.filter(i => i.type === 'card');
  const monthly    = cardItems.filter(i => i.cycle === 'monthly');
  const monthlyTotal = monthly.reduce((s,i) => s + Number(i.amount||0), 0);
  const todayItems = state.items.filter(isTodayItem);
  const thisMonthBills = state.items.filter(isThisMonthBill);
  const yearlyThisMonth = cardItems.filter(i => i.cycle === 'yearly' && new Date(i.date).getMonth()+1 === thisMonth);

  const cardTotals = {};
  monthly.forEach(i => { cardTotals[i.card] = (cardTotals[i.card]||0) + Number(i.amount); });
  const maxT = Math.max(...Object.values(cardTotals), 1);

  let html = '';

  // today alert
  if (todayItems.length > 0) {
    html += `<div class="glass glow-alert">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <span class="pulse-dot"></span>
        <span style="font-size:13px;font-weight:600;color:#fbbf24;">今天扣款／繳費 · ${todayItems.length} 筆</span>
      </div>`;
    todayItems.forEach(item => {
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);">
        <div>
          <div style="font-size:14px;font-weight:500;color:#e2eaf8;margin-bottom:5px;">${escHtml(item.name)}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            ${item.card      ? cardBadgeHTML(item.card, cardMap) : ''}
            ${item.payMethod ? billBadgeHTML(item.payMethod)     : ''}
          </div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:#fbbf24;">
          ${item.amount ? `TWD ${Number(item.amount).toLocaleString()}` : '金額不定'}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // main total
  html += `<div class="glass glow-blue">
    <div class="label">本月信用卡扣款總額</div>
    <div style="display:flex;align-items:flex-end;gap:4px;">
      <div style="font-size:38px;font-weight:300;letter-spacing:-1.5px;font-family:'DM Mono',monospace;background:linear-gradient(90deg,#e2eaf8,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;">${monthlyTotal.toLocaleString()}</div>
      <span style="font-size:15px;font-weight:500;color:#60a5fa;margin-left:2px;font-family:'DM Mono',monospace;">TWD</span>
    </div>
    <div style="font-size:12px;color:#475569;margin-top:8px;">${monthly.length} 筆固定訂閱</div>
  </div>`;

  // mini grid
  html += `<div class="summary-grid">
    <div class="mini-card"><div class="mini-val">${monthly.length}</div><div class="mini-label">每月刷卡筆數</div></div>
    <div class="mini-card" style="border-color:rgba(34,211,238,.25);">
      <div class="mini-val" style="color:#22d3ee;">${thisMonthBills.length}</div>
      <div class="mini-label">本月繳費筆數</div>
    </div>
  </div>`;

  // per-card breakdown
  if (Object.keys(cardTotals).length > 0) {
    html += `<div class="glass"><div class="label" style="margin-bottom:14px;">各卡本月月扣小計</div>`;
    Object.entries(cardTotals).forEach(([card, total]) => {
      const c = cardMap[card] || PALETTE[0];
      html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        ${cardBadgeHTML(card, cardMap)}
        <div class="bar-wrap"><div class="bar-fill" style="width:${(total/maxT)*100}%;background:${c.dot};opacity:.65;"></div></div>
        <span style="font-family:'DM Mono',monospace;font-size:12px;color:#64748b;min-width:84px;text-align:right;">TWD ${total.toLocaleString()}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // this month bills
  if (thisMonthBills.length > 0) {
    html += `<div class="sec-title">本月繳費提醒</div>`;
    thisMonthBills.forEach(i => { html += listRowHTML(i, cardMap, false); });
  }

  // yearly this month
  if (yearlyThisMonth.length > 0) {
    html += `<div class="sec-title">本月年度扣款</div>`;
    yearlyThisMonth.forEach(i => { html += listRowHTML(i, cardMap, true); });
  }

  // monthly card
  if (monthly.length > 0) {
    html += `<div class="sec-title">每月信用卡扣款</div>`;
    monthly.sort((a,b) => a.day - b.day).forEach(i => { html += listRowHTML(i, cardMap, true); });
  }

  if (state.items.length === 0) {
    html += `<div class="empty-state">✦<br><br>還沒有資料<br>前往「新增」頁面加入第一筆</div>`;
  }

  // pickmycard banner
  html += `<div class="sec-title">信用卡回饋查詢</div>
    <a class="pmc-banner" href="https://pickmycard.app" target="_blank">
      <div class="pmc-icon">💳</div>
      <div style="flex:1;">
        <div class="pmc-title">信用卡回饋大師</div>
        <div class="pmc-sub">輸入商家名稱，找出最高回饋卡<br/>pickmycard.app</div>
      </div>
      <span style="font-size:16px;color:#60a5fa;flex-shrink:0;">↗</span>
    </a>`;

  return html;
}

// ─── List ──────────────────────────────────────────
let listSearch = '';
let listFilter = '全部';

function renderList() {
  const cardMap = getCardMap();
  const filtered = state.items.filter(i => {
    const ms = i.name.toLowerCase().includes(listSearch.toLowerCase());
    const mf = listFilter==='全部' || (listFilter==='刷卡'&&i.type==='card') || (listFilter==='繳費'&&i.type==='bill');
    return ms && mf;
  });
  const cardItems = filtered.filter(i => i.type==='card');
  const billItems = filtered.filter(i => i.type==='bill');

  let html = `<input class="search-bar" id="list-search" placeholder="🔍  搜尋名稱…" value="${escHtml(listSearch)}" oninput="onListSearch(this.value)"/>`;
  html += `<div class="filter-strip">`;
  ['全部','刷卡','繳費'].forEach(f => {
    html += `<button class="filter-btn ${listFilter===f?'active':''}" onclick="onListFilter('${f}')">${f}</button>`;
  });
  html += `</div>`;

  if (filtered.length === 0) html += `<div class="empty-state">找不到符合的項目</div>`;

  if (cardItems.length > 0) {
    html += `<div class="sec-title">信用卡扣款</div>`;
    cardItems.forEach(i => { html += listRowHTML(i, cardMap, true); });
  }
  if (billItems.length > 0) {
    html += `<div class="sec-title">繳費提醒</div>`;
    billItems.forEach(i => { html += listRowHTML(i, cardMap, false); });
  }
  return html;
}

function onListSearch(v) { listSearch = v; document.getElementById('content').innerHTML = renderList(); }
function onListFilter(f) { listFilter = f; document.getElementById('content').innerHTML = renderList(); }

// ─── Add / Edit ────────────────────────────────────
let addType  = 'card';
let addCycle = 'monthly';
let addCard  = '';
let editingId = null;

function renderAdd(prefill) {
  const p = prefill || {};
  const type  = p.type  || addType;
  const cycle = p.cycle || addCycle;
  const isMulti  = ['bimonthly','quarterly','semiannual'].includes(cycle);
  const isYearly = cycle === 'yearly';
  const cardMap  = getCardMap();

  function cycleClass(v) {
    if (cycle !== v) return 'cycle-btn';
    if (v === 'yearly') return 'cycle-btn active-y';
    if (['bimonthly','quarterly','semiannual'].includes(v)) return 'cycle-btn active-x';
    return 'cycle-btn active-m';
  }

  let html = `<div class="glass">
    <!-- Type -->
    <div class="form-group">
      <div class="form-label">項目類型</div>
      <div class="type-toggle">
        <button class="type-btn ${type==='card'?'active-card':''}" onclick="setAddType('card')">💳 信用卡扣款</button>
        <button class="type-btn ${type==='bill'?'active-bill':''}" onclick="setAddType('bill')">🧾 繳費提醒</button>
      </div>
    </div>
    <!-- Cycle -->
    <div class="form-group">
      <div class="form-label">週期</div>
      <div class="cycle-grid">
        ${CYCLE_OPTIONS.map(o => `<button class="${cycleClass(o.value)}" onclick="setAddCycle('${o.value}')">${o.label}</button>`).join('')}
      </div>
      ${isMulti ? `<div class="next-hint">📅 需填「下次繳費日期」，系統才能判斷本月是否提醒</div>` : ''}
    </div>
    <!-- Name -->
    <div class="form-group">
      <label class="form-label">名稱</label>
      <input class="form-input" id="inp-name" placeholder="${type==='card'?'例：Netflix、Spotify':'例：台電電費、水費'}" value="${escHtml(p.name||'')}"/>
    </div>
    <!-- Amount -->
    <div class="form-group">
      <label class="form-label">金額（TWD）${type==='bill'?'<span style="font-size:10px;color:#475569;font-weight:400;margin-left:6px;text-transform:none;letter-spacing:0;">— 非必填</span>':''}</label>
      <input class="form-input" id="inp-amount" type="number" placeholder="${type==='bill'?'不填代表金額不定':'0'}" value="${escHtml(p.amount||'')}"/>
      ${type==='bill'?'<div class="form-note">💡 水電帳單金額每期不同，可以不填</div>':''}
    </div>`;

  // Date fields
  if (cycle === 'monthly') {
    html += `<div class="form-group">
      <label class="form-label">${type==='card'?'扣款日':'繳費日'}</label>
      <select class="form-select" id="inp-day">
        ${Array.from({length:31},(_,i)=>i+1).map(d=>`<option value="${d}" ${(p.day||1)==d?'selected':''}>${d} 號</option>`).join('')}
      </select>
    </div>`;
  } else if (isMulti) {
    html += `<div class="form-group">
      <label class="form-label">下次繳費日期</label>
      <input class="form-input" id="inp-next-date" type="date" style="color-scheme:dark;" value="${escHtml(p.nextDate||'')}"/>
      <div class="form-note">系統會依此日期往後推算每次提醒</div>
    </div>`;
  } else if (isYearly) {
    html += `<div class="form-group">
      <label class="form-label">年度日期</label>
      <input class="form-input" id="inp-date" type="date" style="color-scheme:dark;" value="${escHtml(p.date||'')}"/>
    </div>`;
  }

  // Card / pay method
  if (type === 'card') {
    const selCard = p.card || addCard;
    html += `<div class="form-group">
      <label class="form-label">信用卡別</label>
      <button class="card-trigger" onclick="openCardModal()">
        ${selCard ? cardBadgeHTML(selCard, cardMap) : '<span class="card-trigger-placeholder">選擇信用卡…</span>'}
        <span style="color:#475569;font-size:12px;margin-left:8px;">▼</span>
      </button>
    </div>`;
  } else {
    html += `<div class="form-group">
      <label class="form-label">繳費方式<span style="font-size:10px;color:#475569;font-weight:400;margin-left:6px;text-transform:none;letter-spacing:0;">— 選填</span></label>
      <select class="form-select" id="inp-pay">
        <option value="">選擇繳費方式</option>
        ${PAY_METHODS.map(m=>`<option value="${escHtml(m)}" ${p.payMethod===m?'selected':''}>${escHtml(m)}</option>`).join('')}
      </select>
    </div>`;
  }

  if (editingId) {
    html += `<div class="edit-actions">
      <button class="btn-primary" onclick="saveItem()">✓ 儲存變更</button>
      <button class="btn-danger"  onclick="deleteItem(${editingId})">刪除</button>
    </div>
    <button class="btn-secondary" onclick="cancelEdit()">取消</button>`;
  } else {
    html += `<button class="btn-primary" onclick="saveItem()">＋ 新增</button>`;
  }

  html += `</div>`;
  html += `<div class="info-box">${type==='bill'
    ?'💡 繳費提醒不綁信用卡，金額可不填，會一起納入 .ics 行事曆匯出。'
    :'💡 點選信用卡別欄位可從清單選卡，或新增自訂卡別。'
  }</div>`;

  return html;
}

function captureFormValues() {
  const p = { type: addType, cycle: addCycle, card: addCard };
  const n  = document.getElementById('inp-name');        if (n)  p.name     = n.value;
  const a  = document.getElementById('inp-amount');      if (a)  p.amount   = a.value;
  const d  = document.getElementById('inp-day');         if (d)  p.day      = Number(d.value);
  const dt = document.getElementById('inp-date');        if (dt) p.date     = dt.value;
  const nd = document.getElementById('inp-next-date');   if (nd) p.nextDate = nd.value;
  const pm = document.getElementById('inp-pay');         if (pm) p.payMethod= pm.value;
  return p;
}

function setAddType(t)  { addType  = t; document.getElementById('content').innerHTML = renderAdd(captureFormValues()); }
function setAddCycle(c) { addCycle = c; document.getElementById('content').innerHTML = renderAdd(captureFormValues()); }

function saveItem() {
  const name   = document.getElementById('inp-name')?.value?.trim();
  const amount = document.getElementById('inp-amount')?.value;
  if (!name) { showToast('⚠️ 請輸入名稱'); return; }
  if (addType === 'card' && !amount) { showToast('⚠️ 請輸入金額'); return; }

  const isMulti  = ['bimonthly','quarterly','semiannual'].includes(addCycle);
  const isYearly = addCycle === 'yearly';

  const itemData = {
    type:      addType,
    name,
    amount:    amount ? Number(amount) : null,
    cycle:     addCycle,
    day:       addCycle === 'monthly' ? Number(document.getElementById('inp-day')?.value || 1) : undefined,
    date:      isYearly ? document.getElementById('inp-date')?.value : undefined,
    nextDate:  isMulti  ? document.getElementById('inp-next-date')?.value : undefined,
    card:      addType === 'card' ? addCard : undefined,
    payMethod: addType === 'bill' ? (document.getElementById('inp-pay')?.value || undefined) : undefined,
  };

  if (editingId) {
    const idx = state.items.findIndex(i => i.id === editingId);
    if (idx !== -1) state.items[idx] = { ...state.items[idx], ...itemData };
    editingId = null;
    showToast('✓ 已儲存');
  } else {
    state.items.push({ id: state.nextId++, ...itemData });
    showToast(`✓ 已新增：${name}`);
  }

  addCard = '';
  saveState();
  switchTab(0);
}

function deleteItem(id) {
  if (!confirm('確定刪除這筆？')) return;
  state.items = state.items.filter(i => i.id !== id);
  editingId = null; addCard = '';
  saveState(); showToast('已刪除');
  closeModal(); switchTab(0);
}

function cancelEdit() { editingId = null; addCard = ''; switchTab(0); }

// ─── Detail modal ──────────────────────────────────
function showDetail(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  const cardMap = getCardMap();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="font-size:22px;">${getIcon(item.name)}</div>
      <div style="font-size:16px;font-weight:600;color:#e2eaf8;flex:1;margin:0 12px;">${escHtml(item.name)}</div>
      ${cycleBadgeHTML(item)}
    </div>
    <div class="detail-row"><span class="detail-key">金額</span>
      <span class="detail-val">${item.amount ? `TWD ${Number(item.amount).toLocaleString()}` : '金額不定'}</span></div>
    <div class="detail-row"><span class="detail-key">時間</span><span class="detail-val">${cycleLabelOf(item)}</span></div>
    ${item.card      ? `<div class="detail-row"><span class="detail-key">信用卡</span><span>${cardBadgeHTML(item.card, cardMap)}</span></div>` : ''}
    ${item.payMethod ? `<div class="detail-row"><span class="detail-key">繳費方式</span><span>${billBadgeHTML(item.payMethod)}</span></div>` : ''}
    <div style="margin-top:18px;display:flex;gap:8px;">
      <button class="btn-primary" style="flex:1;" onclick="startEdit(${id})">✎ 編輯</button>
      <button class="btn-danger" onclick="deleteItem(${id})">刪除</button>
    </div>
    <button class="btn-secondary" onclick="closeModal()">關閉</button>
  </div>`;
  overlay.addEventListener('click', closeModal);
  document.body.appendChild(overlay);
}

function closeModal() { document.querySelector('.modal-overlay')?.remove(); }

function startEdit(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  closeModal();
  editingId = id;
  addType   = item.type  || 'card';
  addCycle  = item.cycle || 'monthly';
  addCard   = item.card  || '';
  activeTab = 2;
  renderTabs();
  document.getElementById('content').innerHTML = renderAdd(item);
}

// ─── Card modal ────────────────────────────────────
function openCardModal() {
  const cardMap = getCardMap();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  function sheetHTML() {
    return `<div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">選擇信用卡</div>
      ${state.cards.map(card => {
        const c   = cardMap[card] || PALETTE[0];
        const sel = addCard === card;
        return `<button class="card-option"
          style="${sel ? `background:${c.bg};border-color:${c.border};` : ''}"
          onclick="selectCard('${escHtml(card)}')">
          <div class="card-option-left">
            <span style="width:11px;height:11px;border-radius:50%;background:${c.dot};display:inline-block;${sel?`box-shadow:0 0 8px ${c.dot};`:''}"></span>
            <span class="card-option-name" style="${sel?`color:${c.text};`:''}">${escHtml(card)}</span>
          </div>
          ${sel ? `<span style="font-size:16px;color:${c.text};">✓</span>` : ''}
        </button>`;
      }).join('')}
      <div id="custom-card-area">
        <button class="add-custom-btn" onclick="showCustomCardInput()">＋ 新增自訂卡別</button>
      </div>
    </div>`;
  }

  overlay.innerHTML = sheetHTML();
  overlay.addEventListener('click', () => { overlay.remove(); renderContent(); });
  document.body.appendChild(overlay);
}

function selectCard(card) {
  addCard = card;
  document.querySelector('.modal-overlay')?.remove();
  document.getElementById('content').innerHTML = renderAdd(captureFormValues());
}

function showCustomCardInput() {
  const area = document.getElementById('custom-card-area');
  if (!area) return;
  area.innerHTML = `<div style="display:flex;gap:8px;margin-top:4px;">
    <input id="custom-card-inp" class="form-input" placeholder="輸入卡名，例：聯邦賴點卡" style="flex:1;" autofocus/>
    <button onclick="addCustomCard()" style="padding:11px 18px;background:rgba(96,165,250,.2);border:1px solid rgba(96,165,250,.35);border-radius:12px;color:#60a5fa;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;">新增</button>
  </div>`;
  setTimeout(() => document.getElementById('custom-card-inp')?.focus(), 50);
}

function addCustomCard() {
  const val = document.getElementById('custom-card-inp')?.value?.trim();
  if (!val) return;
  if (!state.cards.includes(val)) state.cards.push(val);
  saveState();
  addCard = val;
  document.querySelector('.modal-overlay')?.remove();
  document.getElementById('content').innerHTML = renderAdd(captureFormValues());
}

// ─── ICS export ────────────────────────────────────
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function fmtICSDate(d) { return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`; }
function makeUID()     { return `${Date.now()}-${Math.random().toString(36).slice(2)}@nightsky`; }

function exportICS() {
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Night Sky//TW','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  const now = new Date();
  const nowStr = `${fmtICSDate(now)}T${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}Z`;

  function addEvent(dStr, title, desc) {
lines.push('BEGIN:VEVENT', `UID:${makeUID()}`, `DTSTAMP:${nowStr}`,
      `DTSTART;TZID=Asia/Taipei:${dStr}T223000`,
      `DTEND;TZID=Asia/Taipei:${dStr}T230000`,
      `SUMMARY:${title}`, `DESCRIPTION:${desc||''}`,
      'BEGIN:VALARM', 'TRIGGER:-PT0M', 'ACTION:DISPLAY', `DESCRIPTION:${title}`, 'END:VALARM', 'END:VEVENT');
  }

  state.items.forEach(item => {
    const amtStr = item.amount ? `TWD ${Number(item.amount).toLocaleString()}` : '請查帳單';
    const cardStr = item.card ? ` · ${item.card}` : '';
    const payStr  = item.payMethod ? ` · ${item.payMethod}` : '';
    const title = `${item.type==='bill'?'繳費':'扣款'}：${item.name}（${amtStr}）${cardStr}${payStr}`;

    if (item.cycle === 'monthly') {
      for (let offset = 0; offset < 12; offset++) {
        const base = new Date(now.getFullYear(), now.getMonth() + offset, 1);
        const yr = base.getFullYear(), mo = base.getMonth() + 1;
        const maxDay = daysInMonth(yr, mo);
        let useDay = item.day, note = '';
        if (useDay > maxDay) { useDay = maxDay; note = `本月無 ${item.day} 號，改月底`; }
        const d = new Date(yr, mo-1, useDay);
        if (d < now) continue;
        addEvent(fmtICSDate(d), title, note);
      }
    } else if (item.cycle === 'yearly') {
      const base = new Date(item.date);
      const mo = base.getMonth()+1, day = base.getDate();
      let startYear = now.getFullYear();
      if (new Date(startYear, mo-1, day) < now) startYear++;
      for (let y = startYear; y < startYear+5; y++) addEvent(fmtICSDate(new Date(y, mo-1, day)), title, '');
    } else if (['bimonthly','quarterly','semiannual'].includes(item.cycle)) {
      const months = CYCLE_OPTIONS.find(c=>c.value===item.cycle)?.months || 2;
      const maxOccurrences = Math.ceil(24 / months);
      let d = new Date(item.nextDate);
      for (let i = 0; i < maxOccurrences; i++) {
        if (d >= now) addEvent(fmtICSDate(d), title, '');
        d = new Date(d.getFullYear(), d.getMonth() + months, d.getDate());
      }
    }
  });

  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], { type:'text/calendar;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nightsky.ics';
  a.click();
  showToast('📅 .ics 已匯出');
}

// ─── JSON backup ───────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nightsky-backup.json';
  a.click();
  showToast('⬇ JSON 備份已匯出');
}

document.getElementById('file-import').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.items && Array.isArray(data.items)) {
        state = data; saveState(); renderContent();
        showToast('✓ 匯入成功，共 ' + state.items.length + ' 筆');
      } else throw new Error();
    } catch { showToast('⚠️ 檔案格式錯誤'); }
  };
  r.readAsText(f);
  this.value = '';
});
